<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fil Communautaire — Anonyme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[--color-bg]">
  <!-- Navbar -->
  <nav class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md border-b border-[#E2EAF2] z-50 h-16 flex items-center px-4 md:px-6">
    <div class="max-w-[1200px] w-full mx-auto flex justify-between items-center">
      <h1 class="text-2xl text-[#1A56A0] select-none cursor-pointer" onclick="location.href='index.html'">Anonyme</h1>
      <div class="flex items-center gap-2 md:gap-5">
        <a href="chatbot.html" class="p-2 md:px-4 md:py-2 text-[--color-text-body] hover:bg-[--color-primary-pale] rounded-full transition-all text-sm font-medium flex items-center gap-2">
           <img src="assets/ia-logo.png" alt="Logo IA" class="w-6 h-6 rounded-full object-cover">
           <span class="hidden md:inline">IA</span>
        </a>
        <a href="messages.html" class="p-2 md:px-4 md:py-2 text-[--color-text-body] hover:bg-[--color-primary-pale] rounded-full transition-all text-sm font-medium flex items-center gap-2">
           <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
           <span class="hidden md:inline">Messages</span>
        </a>
        <button onclick="location.href='donate.html'" class="p-2 md:px-4 md:py-2 text-[--color-text-body] hover:bg-[--color-primary-pale] rounded-full transition-all text-sm font-medium flex items-center gap-2 group">
           <svg class="animate-heart-cycle" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
           <span class="hidden md:inline">Don</span>
        </button>
        <div class="w-9 h-9 bg-[--color-primary-pale] text-[--color-primary] rounded-full flex items-center justify-center font-bold border border-[--color-primary] cursor-pointer hover:shadow-md transition-all nav-avatar">S</div>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <main class="pt-24 pb-20 px-4 md:px-0 max-w-[680px] mx-auto min-h-screen">
    <!-- Composer -->
    <div class="glass-card p-4 transition-all hover:border-[--color-primary-light] mb-8 bg-white border border-[#E2EAF2] rounded-[14px]">
      <div class="flex gap-4">
        <div class="w-9 h-9 bg-[--color-primary-pale] text-[--color-primary] rounded-full flex items-center justify-center font-bold shrink-0 composer-avatar">S</div>
        <div class="flex-1">
          <textarea id="composer-textarea" rows="1" placeholder="Exprimez-vous librement…" class="w-full bg-transparent border-none resize-none focus:ring-0 text-sm md:text-base text-[--color-text-body] outline-none min-h-[40px] pt-1" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
          <div id="anon-badge" class="hidden inline-flex items-center mt-3 bg-[--color-primary-pale] text-[--color-primary] text-[10px] font-bold tracking-wider px-2.5 py-1 rounded-full border border-[--color-primary]/20">ANONYME</div>
        </div>
      </div>
      <div class="mt-4 pt-4 border-t border-[#F0F4F8] flex justify-between items-center">
        <div class="flex items-center gap-2.5">
          <label class="switch">
            <input type="checkbox" id="composer-anon-toggle">
            <span class="slider"></span>
          </label>
          <span class="text-xs font-semibold text-[--color-text-muted]">Anonyme</span>
        </div>
        <button id="btn-publish" class="bg-[--color-primary] text-white text-sm font-semibold px-6 py-2 rounded-[8px] hover:opacity-90 transition-all opacity-50 cursor-not-allowed" disabled>Publier</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-6">
      <button class="shrink-0 px-6 py-2.5 text-xs font-bold rounded-full bg-[--color-primary] text-white shadow-sm">Récent</button>
      <button class="shrink-0 px-6 py-2.5 text-xs font-bold rounded-full bg-white border border-[#E2EAF2] text-[--color-text-muted] hover:bg-white/50">Populaire</button>
      <button class="shrink-0 px-6 py-2.5 text-xs font-bold rounded-full bg-white border border-[#E2EAF2] text-[--color-text-muted] hover:bg-white/50">Mes posts</button>
    </div>

    <!-- Feed List -->
    <div id="feed-container" class="space-y-6">
      <!-- Posts injected by JS -->
    </div>
  </main>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/feed.js"></script>

  <script>
    const composer = document.getElementById('composer-textarea');
    const anonToggle = document.getElementById('composer-anon-toggle');
    const anonBadge = document.getElementById('anon-badge');
    const publishBtn = document.getElementById('btn-publish');
    const navAvatar = document.querySelector('.nav-avatar');
    const composerAvatar = document.querySelector('.composer-avatar');

    // Update UI with User Data
    const user = JSON.parse(localStorage.getItem('user'));
    if (user) {
        const initial = user.pseudo[0].toUpperCase();
        if (navAvatar) navAvatar.innerText = initial;
        if (composerAvatar) composerAvatar.innerText = initial;
    }

    // Composer interactions
    composer.oninput = () => {
      composer.style.height = '';
      composer.style.height = (composer.scrollHeight) + 'px';
      
      const hasContent = composer.value.trim() !== "";
      publishBtn.disabled = !hasContent;
      publishBtn.classList.toggle('opacity-50', !hasContent);
      publishBtn.classList.toggle('cursor-not-allowed', !hasContent);
    };

    anonToggle.onchange = () => {
      anonBadge.classList.toggle('hidden', !anonToggle.checked);
    };

    // Real Publish Logic
    publishBtn.onclick = async () => {
      const content = composer.value.trim();
      const isAnonymous = anonToggle.checked;
      
      publishBtn.disabled = true;
      publishBtn.innerHTML = `<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mx-auto"></div>`;

      try {
        await publishPost(content, isAnonymous);
        
        composer.value = "";
        composer.style.height = '';
        anonToggle.checked = false;
        anonBadge.classList.add('hidden');
        publishBtn.innerText = "Publier";
        publishBtn.classList.add('opacity-50', 'cursor-not-allowed');
      } catch (e) {
        publishBtn.disabled = false;
        publishBtn.innerText = "Publier";
        alert('Erreur lors de la publication : ' + e.message);
      }
    };

    // Logout shortcut for the navbar avatar
    if (navAvatar) {
        navAvatar.title = "Déconnexion";
        navAvatar.onclick = () => {
            if (confirm('Voulez-vous vous déconnecter ?')) logout();
        };
    }
  </script>
</body>
</html>
