<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonyme - Fil Communautaire</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="feed-container animate-in" id="feedList">
        <!-- Posts will be loaded here as full-screen cards -->
        <div id="loader" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
            <p>Chargement du fil Anonyme...</p>
        </div>
    </div>

    <!-- Floating Action Button for Posting -->
    <button id="showPublishBtn" class="glass-card" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid var(--primary); z-index: 100; cursor: pointer;">+</button>

    <!-- Overlay Post Modal -->
    <div id="postModal" class="glass-card" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 500px; z-index: 200; padding: 25px;">
        <h3 style="margin-bottom: 20px;">Nouvelle Publication</h3>
        <textarea id="postContent" placeholder="Qu'avez-vous en tête ?" style="width: 100%; height: 150px; padding: 10px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: white;" required></textarea>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
            <label style="color: var(--text-muted); font-size: 0.9rem;">
                <input type="checkbox" id="isAnonymous"> Post anonyme
            </label>
            <div style="display: flex; gap: 10px;">
                <button onclick="document.getElementById('postModal').style.display='none'" class="btn" style="width: auto; background: transparent; color: white; border: 1px solid var(--border);">Annuler</button>
                <button id="publishBtn" class="btn btn-primary" style="width: auto; padding: 10px 30px;">Publier</button>
            </div>
        </div>
    </div>

    <!-- Overlay Comments Modal -->
    <div id="commentsModal" class="glass-card" style="display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; height: 60vh; z-index: 300; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; overflow: hidden;">
        <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <h4 style="margin: 0;">Commentaires</h4>
            <button onclick="document.getElementById('commentsModal').style.display='none'" class="action-btn" style="font-size: 1.5rem;">×</button>
        </div>
        <div id="commentsList" style="flex: 1; overflow-y: auto; padding: 20px;">
            <!-- Comments here -->
        </div>
        <div style="padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px;">
            <input type="text" id="commentInput" placeholder="Ajouter un commentaire..." style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--glass); color: white;">
            <button id="submitCommentBtn" class="btn btn-primary" style="width: auto; padding: 0 20px;">Envoyer</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/feed.js"></script>
    <script>
        checkAuth();
        document.getElementById('publishBtn').addEventListener('click', () => {
            const content = document.getElementById('postContent').value;
            const isAnonymous = document.getElementById('isAnonymous').checked;
            publishPost(content, isAnonymous);
        });
        loadFeed();
    </script>
</body>
</html>
