<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messagerie PRO - Anonyme</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <nav>
        <div class="logo">ANONYME PRO</div>
        <div class="nav-links">
            <a href="/index.html">Fil</a>
            <a href="/pro/dashboard.html">Dashboard</a>
            <a href="/pro/messages.html">Conversations</a>
            <button onclick="logout()" class="action-btn">Déconnexion</button>
        </div>
    </nav>

    <div class="container animate-in">
        <div style="display: grid; grid-template-columns: 350px 1fr; gap: 20px; margin-top: 40px;">
            <!-- Column 1: Conversations List -->
            <div class="glass-card" style="padding: 20px;">
                <h3>💬 Conversations</h3>
                <div id="convList" style="margin-top: 20px;">
                    <p style="color: var(--text-muted); font-size: 0.8rem;">Chargement des discussions...</p>
                </div>
            </div>

            <!-- Column 2: Chat Area -->
            <div class="glass-card chat-container">
                <div id="chatPartnerHeader" style="padding: 15px; border-bottom: 1px solid var(--border); font-weight: 700;">
                    Sélectionnez un membre
                </div>

                <div id="chatHistory" class="messages-list" style="flex: 1; min-height: 400px;">
                    <p style="text-align: center; color: var(--text-muted); margin-top: 100px;">Aucune discussion sélectionnée</p>
                </div>

                <div id="messageInputArea" style="padding: 20px; border-top: 1px solid var(--border); display: none;">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="chatInput" placeholder="Répondre..." style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--glass); color: white;">
                        <button id="sendMsgBtn" class="btn btn-primary" style="width: auto; padding: 0 30px;">Répondre</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/messages.js"></script>
    <script>
        checkAuth();
        initChat();

        // This would normally fetch participants from a separate api
        // For simplicity, we'll implement a logic to find recent message senders
        const loadRecentConversations = async () => {
            try {
                // In a real app, GET /api/messages/conversations would be cleaner
                // Here we fetch messages for the PRO user to see who they're talking with
                // For demonstration, we'll use the profile/feed list logic
                const list = document.getElementById('convList');
                list.innerHTML = `<div class="glass-card" style="padding: 10px; cursor: pointer; margin-bottom: 10px;" onclick="selectPartner('MEMBER_ID', 'Membre Anonyme')">👤 Membre Anonyme</div>`;
            } catch (error) {
                console.error(error);
            }
        };

        const selectPartner = (id, name) => {
            window.currentChatPartnerId = id;
            document.getElementById('chatPartnerHeader').innerText = `Discussion avec ${name}`;
            document.getElementById('messageInputArea').style.display = 'block';
            loadConversations(id);
            
            document.getElementById('sendMsgBtn').onclick = () => {
                const content = document.getElementById('chatInput').value;
                sendMessageToPartner(id, content);
            };
        };

        loadRecentConversations();
    </script>
</body>
</html>
