<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Anonyme</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav>
        <div class="logo">ANONYME ADMIN</div>
        <div class="nav-links">
            <a href="/index.html">Fil Public</a>
            <a href="/admin/dashboard.html">Utilisateurs</a>
            <a href="/admin/dashboard.html?view=posts">Contenus</a>
            <a href="/admin/dashboard.html?view=badges">Badges</a>
            <a href="/admin/dashboard.html?view=reports">Signalements</a>
            <a href="/admin/dashboard.html?view=logs">Logs</a>
            <button onclick="logout()" class="action-btn">Déconnexion</button>
        </div>
    </nav>

    <div class="container animate-in">
        <div class="container" style="max-width: 1000px; padding: 20px;">
        <div class="stats-bar" style="display: flex; gap: 20px; margin-bottom: 30px;">
            <div class="glass-card" style="padding: 15px; flex: 1; text-align: center;">
                <h4 style="color: var(--primary);">Utilisateurs</h4>
                <div id="statUsers" style="font-size: 1.5rem; font-weight: 700;">--</div>
            </div>
            <div class="glass-card" style="padding: 15px; flex: 1; text-align: center;">
                <h4 style="color: var(--primary);">Posts</h4>
                <div id="statPosts" style="font-size: 1.5rem; font-weight: 700;">--</div>
            </div>
            <div class="glass-card" style="padding: 15px; flex: 1; text-align: center;">
                <h4 style="color: #ef4444;">Signalements</h4>
                <div id="statReports" style="font-size: 1.5rem; font-weight: 700;">--</div>
            </div>
            <div class="glass-card" style="padding: 15px; flex: 1; text-align: center;">
                <h4 style="color: #f59e0b;">PROs</h4>
                <div id="statPros" style="font-size: 1.5rem; font-weight: 700;">--</div>
            </div>
        </div>

        <h2 id="viewTitle" style="margin-bottom: 20px;">Gestion des Utilisateurs</h2>
            <div id="contentTable" style="margin-top: 20px; overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid var(--border);">
                            <th style="padding: 10px;">Pseudo</th>
                            <th style="padding: 10px;">Rôle</th>
                            <th style="padding: 10px;">Statut</th>
                            <th style="padding: 10px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminDataTable">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        checkAuth();
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'ADMIN') {
            window.location.href = '/login.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const view = urlParams.get('view') || 'users';
        loadStats();

        if (view === 'users') {
            document.getElementById('viewTitle').innerText = 'Gestion des Utilisateurs';
            loadUsers();
        } else if (view === 'posts') {
            document.getElementById('viewTitle').innerText = 'Gestion des Contenus (Posts)';
            loadAllPosts();
        } else if (view === 'badges') {
             document.getElementById('viewTitle').innerText = 'Demandes de Badge PRO';
             loadVerifications();
        } else if (view === 'reports') {
             document.getElementById('viewTitle').innerText = 'Signalements';
             loadReports();
        } else if (view === 'logs') {
             document.getElementById('viewTitle').innerText = 'Logs Admin';
             loadLogs();
        }
    </script>
</body>
</html>
