<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Anonyme</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-container animate-in">
        <div class="glass-card p-40">
            <div class="auth-header">
                <h1>ANONYME</h1>
                <p>Rejoignez la communauté en toute confiance.</p>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Nom Complet</label>
                    <input type="text" id="fullName" placeholder="Jean Dupont" required>
                </div>

                <div class="form-group">
                    <label for="pseudo">Pseudonyme (sera votre identité publique)</label>
                    <input type="text" id="pseudo" placeholder="ninja_secret" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary">Créer mon compte</button>
            </form>

            <div class="auth-footer">
                Déjà un compte ? <a href="/login.html">Se connecter</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                fullName: document.getElementById('fullName').value,
                pseudo: document.getElementById('pseudo').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            register(userData);
        });
    </script>
</body>
</html>
