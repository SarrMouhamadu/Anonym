<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA - Anonyme</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">ANONYME</div>
        <div class="nav-links">
            <a href="/index.html">Fil</a>
            <a href="/profile.html">Mon Profil</a>
            <a href="/messages.html">Messages</a>
            <a href="/chatbot.html">Chat IA</a>
            <button onclick="logout()" class="action-btn">Déconnexion</button>
        </div>
    </nav>

    <div class="container animate-in">
        <div class="glass-card chat-container" style="margin-top: 20px;">
            <div class="auth-header" style="padding: 20px; border-bottom: 1px solid var(--border);">
                <h2>Assistant IA Anonyme</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Posez n'importe quelle question en toute discrétion.</p>
            </div>

            <div id="chatHistory" class="messages-list">
                <!-- Chat messages here -->
                <div class="message msg-received">
                    Bonjour ! Je suis l'assistant IA d'Anonyme. Comment puis-je vous aider aujourd'hui ?
                </div>
            </div>

            <div style="padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px;">
                <input type="text" id="chatInput" placeholder="Écrire un message..." style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--glass); color: white;">
                <button id="sendChatBtn" class="btn btn-primary" style="width: auto; padding: 0 30px;">Envoyer</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/chatbot.js"></script>
    <script>
        checkAuth();
        document.getElementById('sendChatBtn').addEventListener('click', sendMessage);
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
