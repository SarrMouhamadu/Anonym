<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Écoute — Anonyme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[--color-bg] min-h-screen flex flex-col">
  <!-- Navbar -->
  <nav class="fixed top-0 left-0 right-0 bg-white border-b border-[#E2EAF2] z-50 h-16 flex items-center px-4">
    <div class="flex-1">
      <a href="index.html" class="inline-flex items-center gap-2 p-2 text-[--color-text-muted] font-medium text-sm hover:text-[--color-text-primary]">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span class="hidden md:inline">Retour au fil</span>
      </a>
    </div>
    <div class="flex-1 text-center">
      <h1 class="text-2xl text-[--color-text-primary]">Écoute</h1>
    </div>
    <div class="flex-1 text-right">
      <div class="inline-flex items-center gap-2 px-3 py-1 bg-[--color-success-pale] text-[--color-success] rounded-full text-[10px] font-bold tracking-widest uppercase">
        <div class="w-1.5 h-1.5 bg-[--color-success] rounded-full animate-pulse"></div>
        Disponible 24h/24
      </div>
    </div>
  </nav>

  <!-- Disclaimer -->
  <div class="fixed top-16 left-0 right-0 py-2.5 px-6 bg-[--color-primary-pale] border-b border-[#D0E4F5] z-40 flex items-center gap-3">
    <div class="text-[--color-primary] shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
    </div>
    <p class="text-[11px] md:text-xs text-[--color-primary] leading-tight font-medium">
      Cet assistant ne remplace pas un professionnel de santé. Si vous traversez une crise, contactez une ligne d'aide.
    </p>
  </div>

  <!-- Chat Area -->
  <main id="chat-container" class="flex-1 pt-32 pb-32 px-4 max-w-[680px] mx-auto w-full flex flex-col gap-4 overflow-y-auto overflow-x-hidden">
    <!-- Messages bot/user injected here -->
  </main>

  <!-- Suggestions area -->
  <div id="suggestions" class="fixed bottom-24 left-0 right-0 px-4 max-w-[680px] mx-auto z-30">
    <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
      <button class="shrink-0 px-4 py-2 bg-[--color-primary-pale] text-[--color-primary] border border-[--color-primary]/20 text-[11px] font-bold rounded-full hover:bg-[--color-primary] hover:text-white transition-all shadow-sm suggestion-btn">Je me sens seul(e)</button>
      <button class="shrink-0 px-4 py-2 bg-[--color-primary-pale] text-[--color-primary] border border-[--color-primary]/20 text-[11px] font-bold rounded-full hover:bg-[--color-primary] hover:text-white transition-all shadow-sm suggestion-btn">J'ai du mal à dormir</button>
      <button class="shrink-0 px-4 py-2 bg-[--color-primary-pale] text-[--color-primary] border border-[--color-primary]/20 text-[11px] font-bold rounded-full hover:bg-[--color-primary] hover:text-white transition-all shadow-sm suggestion-btn">Je suis stressé(e)</button>
      <button class="shrink-0 px-4 py-2 bg-[--color-primary-pale] text-[--color-primary] border border-[--color-primary]/20 text-[11px] font-bold rounded-full hover:bg-[--color-primary] hover:text-white transition-all shadow-sm suggestion-btn">Je ne sais plus quoi faire</button>
    </div>
  </div>

  <!-- Saisie Zone -->
  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#E2EAF2] p-4 z-50">
    <div class="max-w-[680px] mx-auto space-y-3">
      <div class="flex gap-3 items-end">
        <textarea id="chat-input" rows="1" placeholder="Tapez votre message ici..." class="flex-1 bg-[--color-bg] border border-[--color-border] focus:border-[--color-primary] rounded-[12px] p-3 text-sm md:text-base text-[--color-text-body] outline-none resize-none max-h-[120px] pt-2.5" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
        <button id="send-btn" class="w-11 h-11 bg-[--color-primary] text-white flex items-center justify-center rounded-[12px] transition-all hover:opacity-90 active:scale-95 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
      <p class="text-[10px] text-[--color-text-muted] text-center font-medium">Cette conversation n'est pas enregistrée. Elle disparaît à la fermeture.</p>
    </div>
  </footer>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const suggestions = document.getElementById('suggestions');

    const botReplies = [
      "Je vous entends. Ce que vous ressentez est réel et important. Pouvez-vous me dire depuis combien de temps vous vous sentez ainsi ?",
      "Merci de me faire confiance avec ça. Ce n'est pas toujours facile de mettre des mots sur ce qu'on ressent. Qu'est-ce qui a déclenché ce sentiment, selon vous ?",
      "Je comprends que c'est difficile. Vous n'êtes pas seul(e) dans cette situation. Qu'est-ce qui vous aiderait le plus en ce moment ?",
      "C'est courageux de vous exprimer. Est-ce que vous avez quelqu'un dans votre entourage à qui vous pouvez vous confier ?",
      "Je suis là avec vous. Prenons le temps qu'il faut. Qu'est-ce qui vous pèse le plus en ce moment ?",
      "Ce que vous vivez mérite d'être entendu. Avez-vous essayé de parler de cela à quelqu'un de proche ?"
    ];

    let currentReplyIndex = 0;

    function appendMessage(text, isUser = false) {
      const div = document.createElement('div');
      div.className = `flex gap-3 max-w-[85%] animate-fade-up ${isUser ? 'ml-auto flex-row-reverse' : ''}`;
      
      const avatarHTML = isUser 
        ? `<div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs shrink-0 bg-[#0F1C2E] text-white">S</div>`
        : `<div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs shrink-0 bg-[--color-primary-pale] text-[--color-primary]">A</div>`;
      
      const bulleHTML = isUser
        ? `<div class="bg-[--color-primary] text-white p-3.5 text-sm rounded-[14px] rounded-tr-none leading-relaxed">${text}</div>`
        : `<div class="bg-white border border-[#E2EAF2] p-3.5 text-sm rounded-[14px] rounded-tl-none leading-relaxed shadow-sm">${text}</div>`;

      div.innerHTML = avatarHTML + bulleHTML;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showTypingIndicator() {
      const div = document.createElement('div');
      div.id = 'typing-indicator';
      div.className = "flex gap-3 animate-fade-up";
      div.innerHTML = `
        <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs shrink-0 bg-[--color-primary-pale] text-[--color-primary]">A</div>
        <div class="bg-white border border-[#E2EAF2] p-4 text-sm rounded-[14px] rounded-tl-none flex gap-1 items-center shadow-sm">
           <div class="w-1.5 h-1.5 bg-[#CBD5E1] rounded-full animate-bounce" style="animation-delay:0"></div>
           <div class="w-1.5 h-1.5 bg-[#CBD5E1] rounded-full animate-bounce" style="animation-delay:0.2s"></div>
           <div class="w-1.5 h-1.5 bg-[#CBD5E1] rounded-full animate-bounce" style="animation-delay:0.4s"></div>
        </div>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function checkCrisis(text) {
      const keywords = ["mourir", "me tuer", "suicide", "suicidaire", "en finir", "plus envie de vivre", "disparaitre", "me suicider"];
      const isCrisis = keywords.some(k => text.toLowerCase().includes(k));
      
      if (isCrisis) {
        const div = document.createElement('div');
        div.className = "bg-[--color-danger-pale] border-l-4 border-[--color-danger] rounded-r-[12px] p-4 animate-fade-up mt-2";
        div.innerHTML = `
          <h3 class="text-[--color-danger] font-bold text-sm mb-1 uppercase tracking-tight">Besoin d'aide immédiate ?</h3>
          <p class="text-[--color-danger] font-bold text-lg">SOS Amitié Sénégal : +221 33 889 15 15</p>
        `;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }
    }

    function handleSend() {
      const text = chatInput.value.trim();
      if (text === "") return;

      if (suggestions) suggestions.remove();

      appendMessage(text, true);
      chatInput.value = "";
      chatInput.style.height = "";

      checkCrisis(text);

      setTimeout(() => {
        showTypingIndicator();
        
        setTimeout(() => {
          document.getElementById('typing-indicator').remove();
          appendMessage(botReplies[currentReplyIndex]);
          currentReplyIndex = (currentReplyIndex + 1) % botReplies.length;
        }, 1500 + Math.random() * 500);
      }, 500);
    }

    sendBtn.onclick = handleSend;
    chatInput.onkeydown = (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    };

    document.querySelectorAll('.suggestion-btn').forEach(btn => {
      btn.onclick = () => {
        chatInput.value = btn.innerText;
        handleSend();
      };
    });

    // Initial Bot message
    setTimeout(() => {
       appendMessage("Bonjour. Je suis là pour vous écouter, sans jugement et en toute confidentialité. Qu'est-ce qui vous amène aujourd'hui ?");
    }, 400);
  </script>
</body>
</html>
